name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

concurrency:
  group: pages-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@9.15.6 --activate
          pnpm --version

      - name: Set build stamp (for website footer)
        run: |
          echo "NUXT_PUBLIC_BUILD_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "NUXT_PUBLIC_BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm -C code install --frozen-lockfile

      - name: Generate static site (SSG)
        run: pnpm -C code generate

      - name: Install Wrangler
        run: npm i -g wrangler@3

      - name: Verify Cloudflare auth (debug)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler --version
          echo "Account ID present: $([[ -n \"$CLOUDFLARE_ACCOUNT_ID\" ]] && echo yes || echo no)"
          wrangler whoami || true

      - name: Ensure Pages project exists (best-effort)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # If the project already exists, this will fail; ignore in that case.
          wrangler pages project create opchelper --production-branch=main || true

      - name: Force production branch to main (best-effort)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          API="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/opchelper"
          echo "GET ${API}"
          curl -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" "${API}" > project.json || true
          python3 - <<'PY'
          import json
          try:
            data = json.load(open("project.json", "r", encoding="utf-8"))
          except Exception as e:
            print("Unable to parse project.json:", e)
            raise SystemExit(0)
          result = data.get("result") or {}
          print("Current production_branch:", result.get("production_branch"))
          PY
          echo "PATCH production_branch=main (best-effort)"
          curl -sS -X PATCH \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"production_branch":"main"}' \
            "${API}" > patch.json || true
          python3 - <<'PY'
          import json
          try:
            data = json.load(open("patch.json", "r", encoding="utf-8"))
          except Exception as e:
            print("Unable to parse patch.json:", e)
            raise SystemExit(0)
          if not data.get("success", False):
            print("Patch did not succeed (best-effort). Errors:", data.get("errors"))
            raise SystemExit(0)
          print("Patch success. production_branch:", (data.get("result") or {}).get("production_branch"))
          PY

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euxo pipefail
          wrangler pages deploy code/.output/public \
            --project-name=opchelper \
            --branch=main \
            --commit-hash="$GITHUB_SHA"
