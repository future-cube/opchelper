name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

concurrency:
  group: pages-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm (Corepack)
        run: |
          corepack enable
          corepack prepare pnpm@9.15.6 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm -C code install --frozen-lockfile

      - name: Generate static site (SSG)
        run: pnpm -C code generate

      - name: Install Wrangler
        run: npm i -g wrangler@3

      - name: Verify Cloudflare auth (debug)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler --version
          echo "Account ID present: $([[ -n \"$CLOUDFLARE_ACCOUNT_ID\" ]] && echo yes || echo no)"
          wrangler whoami || true

      - name: Ensure Pages project exists (best-effort)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # If the project already exists, this will fail; ignore in that case.
          wrangler pages project create opchelper --production-branch=main --account-id="$CLOUDFLARE_ACCOUNT_ID" || true

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euxo pipefail
          wrangler pages deploy code/.output/public \
            --project-name=opchelper \
            --branch=main \
            --commit-hash="$GITHUB_SHA" \
            --account-id="$CLOUDFLARE_ACCOUNT_ID" \
            --log-level=debug
