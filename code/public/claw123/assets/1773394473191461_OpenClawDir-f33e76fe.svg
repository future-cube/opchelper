  <!-- Body -->
  <line x1="24" y1="34" x2="24" y2="44" stroke="url(#g)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Tail segments -->
  <path d="M18 44 Q24 48, 30 44" stroke="url(#g)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M20 48 Q24 51, 28 48" stroke="url(#g)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Dir dot -->
  <circle cx="46" cy="46" r="5" fill="#f97316"/>
  <!-- Dir text -->
  <text x="46" y="42" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700" fill="#f97316" text-anchor="middle">Dir</text>
</svg>
