<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <!-- Claw left -->
  <path d="M16 18 C10 14, 6 22, 12 28 L20 32" stroke="url(#g)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Claw right -->
  <path d="M32 18 C38 14, 42 22, 36 28 L28 32" stroke="url(#g)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Claw base / body -->
